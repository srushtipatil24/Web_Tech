<h2>Employee Management</h2>

<div class="form">
  <input [(ngModel)]="newEmployee.name" placeholder="Name" />
  <input [(ngModel)]="newEmployee.department" placeholder="Department" />
  <input [(ngModel)]="newEmployee.salary" type="number" placeholder="Salary" />

  <button (click)="addEmployee()">Add</button>
</div>

<table>
  <tr>
    <th>Name</th>
    <th>Department</th>
    <th>Salary</th>
    <th>Action</th>
  </tr>

  <tr *ngFor="let emp of employees">
    <td>{{ emp.name }}</td>
    <td>{{ emp.department }}</td>
    <td>{{ emp.salary }}</td>
    <td>
      <button (click)="deleteEmployee(emp.id)">Delete</button>
    </td>
  </tr>
</table>
